services:
  backend:
    build:
      context: ../backend/unispeaking-server
    env_file:
      - ./env/.env
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ../frontend/unispeaking-web
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-/backend}
    ports:
      - "3000:80"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
